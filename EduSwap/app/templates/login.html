{% extends 'base.html' %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; width: 100%; min-height: 70vh; padding: 20px;">
    <div style="background: #1e293b; padding: 40px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; box-sizing: border-box;">
        
        <h2 style="color: white; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px;">Xush kelibsiz! 👋</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px;">Tizimga kirish uchun ma'lumotlarni kiriting</p>

        <form method="POST" style="width: 100%;">
            {% csrf_token %}
            <!-- Login -->
            <div style="text-align: left; width: 100%; margin-bottom: 20px;">
                <label style="color: #94a3b8; font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 8px; margin-left: 5px;">Login</label>
                <input type="text" name="username" placeholder="Ismingizni yozing" required
                       style="width: 100%; background: #0f172a; border: 2px solid #334155; color: white; padding: 14px; border-radius: 14px; outline: none; box-sizing: border-box; display: block;">
            </div>

            <!-- Parol -->
            <div style="text-align: left; width: 100%; margin-bottom: 30px;">
                <label style="color: #94a3b8; font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 8px; margin-left: 5px;">Parol</label>
                <input type="password" name="password" placeholder="••••••••" required
                       style="width: 100%; background: #0f172a; border: 2px solid #334155; color: white; padding: 14px; border-radius: 14px; outline: none; box-sizing: border-box; display: block;">
            </div>

            <button type="submit" style="width: 100%; background: #6366f1; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);">
                Kirish
            </button>
        </form>

        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
            <p style="color: #94a3b8; font-size: 0.85rem;">
                Profilingiz yo'qmi? <a href="{% url 'signup' %}" style="color: #6366f1; text-decoration: none; font-weight: 700;">Ro'yxatdan o'ting</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
